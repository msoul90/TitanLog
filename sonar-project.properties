# Sonar exclusions for email templates rendered with table-based layout.
# These files intentionally use email-client-oriented HTML patterns.
sonar.exclusions=supabase/templates/**,src/data/exercise-guides.ts,src/data/stretch-guides.ts,**/src/data/exercise-guides.ts,**/src/data/stretch-guides.ts

# Analyze only TypeScript source tree in this repo.
sonar.inclusions=src/**/*.ts

# Force explicit source/test classification to avoid tests being treated as source code.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/__tests__/**/*.ts

# Static data catalogs intentionally contain repetitive instructional text.
# Exclude them only from CPD (duplication) calculations, not from other analysis.
sonar.cpd.exclusions=src/data/exercise-guides.ts,src/data/stretch-guides.ts,**/src/data/exercise-guides.ts,**/src/data/stretch-guides.ts,src/**/*.test.ts,src/**/__tests__/**

# Coverage report generated by Vitest.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
