# These files intentionally use email-client-oriented HTML patterns.
sonar.exclusions=supabase/templates/**

# Static data catalogs intentionally contain repetitive instructional text.
# Exclude them only from CPD (duplication) calculations, not from other analysis.
sonar.cpd.exclusions=src/data/exercise-guides.ts,src/data/stretch-guides.ts
