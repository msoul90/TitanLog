name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  VITE_SUPABASE_URL: https://ci-project.supabase.co
  VITE_SUPABASE_ANON_KEY: ci_anon_key_abcdefghijklmnopqrstuvwxyz123456

jobs:
  checks:
    name: Checks (Type + Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  app:
    name: App Validation
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run app tests
        shell: bash
        run: |
          mapfile -t tests < <(find src/__tests__ -maxdepth 1 -name "*.test.ts" | sort)
          if [ ${#tests[@]} -eq 0 ]; then
            echo "No app tests found in src/__tests__"
            exit 1
          fi
          npm run test -- "${tests[@]}"

      - name: Build
        run: npm run build

      - name: Verify app entry output
        run: test -f _site/index.html

  dashboard:
    name: Dashboard Validation
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run dashboard tests
        shell: bash
        run: |
          mapfile -t tests < <(find src/__tests__/dashboard -maxdepth 1 -name "*.test.ts" | sort)
          if [ ${#tests[@]} -eq 0 ]; then
            echo "No dashboard tests found in src/__tests__/dashboard"
            exit 1
          fi
          npm run test -- "${tests[@]}"

      - name: Build
        run: npm run build

      - name: Verify dashboard entry output
        run: test -f _site/dashboard.html
