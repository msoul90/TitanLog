name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject Supabase credentials
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          sed -i "s|TU_PROJECT_ID.supabase.co|${SUPABASE_URL}|g" src/db.ts
          sed -i "s|TU_ANON_PUBLIC_KEY|${SUPABASE_ANON}|g" src/db.ts

      - name: Build TypeScript
        run: npm run build

      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r css _site/
          cp -r dist _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
